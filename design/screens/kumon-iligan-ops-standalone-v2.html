<script type="text/babel" data-presets="react">

// app-theme.jsx — Calm & breathable theme tokens for Kumon Iligan Ops
// Light/dark via a `dark` boolean. Status indicator style (dot/pill/bar) is a separate prop.

const lightTheme = {
  // Surfaces
  bg:        '#f7f5f0',           // warm off-white canvas
  surface:   '#ffffff',           // raised cards
  sunken:    '#efece5',           // depressed wells
  // Text
  text:      '#1a1d1a',
  textMuted: '#6b6e69',
  textFaint: '#9b9d97',
  // Lines
  border:    'rgba(26,29,26,0.08)',
  borderStrong: 'rgba(26,29,26,0.14)',
  // Accent (forest green — calm, breathable)
  accent:    '#3a7d5c',
  accentInk: '#1f4a36',
  accentSoft:'#e7f0ea',
  // Status (oklch-paired warm/cool greens, ambers, rusts, grays)
  paid:      { fg: '#1f5a3e', bg: '#dde9df', dot: '#3a7d5c' },
  partial:   { fg: '#7a5a18', bg: '#f1e8d2', dot: '#b59230' },
  unpaid:    { fg: '#7a3525', bg: '#f1dfd8', dot: '#b85a3a' },
  pending:   { fg: '#525551', bg: '#e6e4dd', dot: '#8a8d87' },
  // Warning / error
  warn:      '#b59230',
  warnSoft:  '#fbf3dc',
  err:       '#b85a3a',
  errSoft:   '#f5e2da',
};

const darkTheme = {
  bg:        '#16191a',
  surface:   '#1f2324',
  sunken:    '#121516',
  text:      '#ecebe4',
  textMuted: '#9ca0a0',
  textFaint: '#6b6f70',
  border:    'rgba(236,235,228,0.08)',
  borderStrong: 'rgba(236,235,228,0.16)',
  accent:    '#7ab896',
  accentInk: '#cbe5d6',
  accentSoft:'#1f3328',
  paid:      { fg: '#9ed3b0', bg: '#1f3328', dot: '#7ab896' },
  partial:   { fg: '#dcc480', bg: '#33291a', dot: '#c4a653' },
  unpaid:    { fg: '#e6a892', bg: '#3a261f', dot: '#d27a5c' },
  pending:   { fg: '#9ca0a0', bg: '#262a2b', dot: '#7a7e7e' },
  warn:      '#c4a653',
  warnSoft:  '#33291a',
  err:       '#d27a5c',
  errSoft:   '#3a261f',
};

const getTheme = (dark) => (dark ? darkTheme : lightTheme);

const FONT_DISPLAY = '"Fraunces", "Iowan Old Style", Georgia, serif';
const FONT_BODY    = '"Inter", -apple-system, system-ui, sans-serif';
const FONT_MONO    = '"JetBrains Mono", ui-monospace, "SF Mono", monospace';

// — wait, system prompt says avoid Inter & Fraunces. Swap for less common pair.
// Display: "Instrument Serif" (calm, airy serif, common in modern editorial UI)
// Body:    "Geist" or "Söhne"-like — use "Geist" (free, modern, breathable sans)
const TYPE = {
  display: '"Geist", "Helvetica Neue", Helvetica, Arial, sans-serif',
  body:    '"Geist", "Helvetica Neue", Helvetica, Arial, sans-serif',
  mono:    '"Geist Mono", ui-monospace, "SF Mono", monospace',
};

// ─── Shared building blocks ────────────────────────────────────────

function StatusBadge({ status, style = 'pill', label, dark = false, size = 'sm' }) {
  const t = getTheme(dark);
  const s = t[status] || t.pending;
  const labels = { paid: 'Paid', partial: 'Partial', unpaid: 'Unpaid', pending: 'Pending' };
  const text = label ?? labels[status] ?? status;

  if (style === 'dot') {
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
        <span style={{
          width: 8, height: 8, borderRadius: '50%', background: s.dot, flexShrink: 0,
        }} />
        <span style={{ color: t.textMuted, fontSize: size === 'sm' ? 13 : 14, fontFamily: TYPE.body }}>{text}</span>
      </div>
    );
  }

  if (style === 'bar') {
    return (
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10 }}>
        <span style={{
          width: 3, height: 16, borderRadius: 2, background: s.dot, flexShrink: 0,
        }} />
        <span style={{ color: t.text, fontSize: size === 'sm' ? 13 : 14, fontFamily: TYPE.body, fontWeight: 500 }}>{text}</span>
      </div>
    );
  }

  // pill
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: size === 'sm' ? '3px 9px' : '5px 11px',
      borderRadius: 999,
      background: s.bg, color: s.fg,
      fontSize: size === 'sm' ? 12 : 13,
      fontFamily: TYPE.body, fontWeight: 500,
      letterSpacing: 0.1,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot }} />
      {text}
    </span>
  );
}

// Generic button
function Btn({ children, variant = 'primary', dark = false, onClick, full, disabled, style }) {
  const t = getTheme(dark);
  const base = {
    fontFamily: TYPE.body, fontSize: 15, fontWeight: 500,
    border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
    padding: '12px 18px', borderRadius: 12,
    width: full ? '100%' : undefined,
    opacity: disabled ? 0.5 : 1,
    transition: 'transform 0.08s, background 0.15s',
    letterSpacing: -0.1,
  };
  const variants = {
    primary: { background: t.accent, color: '#fff' },
    secondary: { background: 'transparent', color: t.text, border: `1px solid ${t.borderStrong}` },
    ghost: { background: 'transparent', color: t.textMuted },
    danger: { background: 'transparent', color: t.err, border: `1px solid ${t.err}` },
  };
  return (
    <button
      onClick={disabled ? undefined : onClick}
      style={{ ...base, ...variants[variant], ...style }}
      onMouseDown={(e) => e.currentTarget.style.transform = 'scale(0.985)'}
      onMouseUp={(e) => e.currentTarget.style.transform = 'scale(1)'}
      onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
    >{children}</button>
  );
}

// Field label + input
function Field({ label, hint, error, warn, children }) {
  const t = getTheme(false);
  return (
    <label style={{ display: 'block', fontFamily: TYPE.body }}>
      <div style={{
        fontSize: 13, fontWeight: 500, color: t.textMuted,
        marginBottom: 8, letterSpacing: 0.1,
      }}>{label}</div>
      {children}
      {error && <div style={{ marginTop: 6, fontSize: 12.5, color: t.err }}>{error}</div>}
      {warn && !error && <div style={{ marginTop: 6, fontSize: 12.5, color: t.warn }}>{warn}</div>}
      {hint && !error && !warn && <div style={{ marginTop: 6, fontSize: 12, color: t.textFaint }}>{hint}</div>}
    </label>
  );
}

function Input({ value, onChange, placeholder, type = 'text', dark = false, error, warn, style }) {
  const t = getTheme(dark);
  const borderColor = error ? t.err : warn ? t.warn : t.border;
  return (
    <input
      type={type} value={value ?? ''} onChange={onChange} placeholder={placeholder}
      style={{
        width: '100%', boxSizing: 'border-box',
        padding: '14px 16px', fontSize: 16,
        fontFamily: TYPE.body, color: t.text,
        background: t.surface,
        border: `1px solid ${borderColor}`,
        borderRadius: 12, outline: 'none',
        transition: 'border-color 0.15s',
        ...style,
      }}
      onFocus={(e) => e.currentTarget.style.borderColor = t.accent}
      onBlur={(e) => e.currentTarget.style.borderColor = borderColor}
    />
  );
}

function Card({ children, dark = false, style, padding = 20 }) {
  const t = getTheme(dark);
  return (
    <div style={{
      background: t.surface,
      border: `1px solid ${t.border}`,
      borderRadius: 16,
      padding,
      ...style,
    }}>{children}</div>
  );
}

Object.assign(window, {
  getTheme, lightTheme, darkTheme, TYPE,
  StatusBadge, Btn, Field, Input, Card,
});

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',

// ─── Step 2-3: Student list with search ────────────────────────────

function StudentListScreen({ theme, statusStyle, dark, onSelect, search, setSearch, filter, setFilter }) {
  const filtered = React.useMemo(() => {
    const q = search.trim().toLowerCase();
    return STUDENTS.filter(s => {
      if (filter !== 'all' && s.status !== filter) return false;
      if (!q) return true;
      return (s.first + ' ' + s.last).toLowerCase().includes(q)
          || s.guardian.toLowerCase().includes(q);
    });
  }, [search, filter]);

  const counts = React.useMemo(() => ({
    all: STUDENTS.length,
    unpaid: STUDENTS.filter(s => s.status === 'unpaid').length,
    partial: STUDENTS.filter(s => s.status === 'partial').length,
    paid: STUDENTS.filter(s => s.status === 'paid').length,
  }), []);

  return (
    <MobileShell theme={theme} dark>
      <TeacherTopBar theme={theme} title="Teacher Riza Mendez" right={
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: theme.accentSoft, color: theme.accentInk,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12, fontWeight: 600,
        }}>RM</div>
      }/>

      <div style={{ marginBottom: 20 }}>
        <div style={{
          fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
          color: theme.textMuted, fontWeight: 600, marginBottom: 6,
        }}>May 2026</div>
        <h1 style={{
          fontFamily: TYPE.display, fontWeight: 400,
          fontSize: 30, lineHeight: 1.1, margin: 0,
          color: theme.text, letterSpacing: -0.5,
        }}>Your students</h1>
        <p style={{ fontSize: 14, color: theme.textMuted, marginTop: 6, marginBottom: 0 }}>
          {counts.unpaid + counts.partial} need a payment this period &middot; {counts.all} total

      </div>

      {/* Search */}
      <div style={{ position: 'relative', marginBottom: 14 }}>
        <svg width="16" height="16" viewBox="0 0 16 16" style={{
          position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)',
        }}>
          <circle cx="7" cy="7" r="5" stroke={theme.textFaint} strokeWidth="1.5" fill="none"/>
          <path d="M11 11l3 3" stroke={theme.textFaint} strokeWidth="1.5" strokeLinecap="round"/>

        <input
          value={search} onChange={e => setSearch(e.target.value)}

            width: '100%', boxSizing: 'border-box',
            padding: '13px 16px 13px 38px', fontSize: 15,
            fontFamily: TYPE.body, color: theme.text,
            background: theme.surface,
            border: `1px solid ${theme.border}`,

      {/* Filter chips */}
      <div style={{

// ─── Step 4-7: Payment recording form ──────────────────────────────

function PaymentFormScreen({ theme, dark, student, form, setForm, onContinue, onBack, onOpenSiblings, batchSiblings }) {
  const siblings = STUDENTS.filter(s => s.familyId === student.familyId && s.id !== student.id);
  const isBatch = batchSiblings && batchSiblings.length > 0;

  // Validation
  const refs = (window.__USED_REFS || ['GC-EXISTING-99']);
  const errors = {};
  const warnings = {};
  if (form.ref && refs.includes(form.ref.trim())) {
    errors.ref = 'This reference number has already been used (PAY-0042). Please verify this is not a duplicate.';
  }
  const amt = parseFloat(form.amount || 0);
  if (form.amount && (!amt || amt <= 0)) errors.amount = 'Amount must be greater than zero';
  if (amt && Math.abs(amt - student.expected) / student.expected > 0.10) {
    warnings.amount = `Amount differs from expected (${peso(student.expected)}) by more than 10%.`;
  }
  if (form.fileTooBig) errors.file = 'File exceeds 5MB limit. Please upload a smaller image.';
  if (form.dateFuture) errors.date = 'Payment date cannot be in the future';

  const canSubmit = form.ref && !errors.ref && form.amount && !errors.amount && form.method && form.date && !errors.date && form.receipt && !errors.file;

  const outstanding = Math.max(0, student.expected - student.paid);

  return (
    <MobileShell theme={theme} dark>
      <TeacherTopBar theme={theme} title="Record payment" onBack={onBack} />

      {/* Auto-filled context card */}
      <Card dark={dark} padding={0} style={{
        background: theme.surface,
        marginBottom: 18, overflow: 'hidden',
      }}>
        <div style={{ padding: '18px 20px 14px', borderBottom: `1px solid ${theme.border}` }}>
          <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600 }}>
            Auto-filled from records
          </div>
          <h2 style={{
            fontFamily: TYPE.display, fontWeight: 400, fontSize: 24, lineHeight: 1.1,
            margin: '6px 0 4px', color: theme.text, letterSpacing: -0.3,
          }}>{student.first} {student.last}</h2>
          <div style={{ fontSize: 13.5, color: theme.textMuted }}>
            Level {student.level} &middot; {student.guardian} &middot; {student.phone}
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0 }}>
          <SummaryCell theme={theme} label="Period" value="May 2026" />
          <SummaryCell theme={theme} label="Expected" value={peso(student.expected)} borderLeft />
          <SummaryCell theme={theme} label="Paid so far" value={peso(student.paid)} borderTop />
          <SummaryCell theme={theme} label="Outstanding" value={peso(outstanding)} borderTop borderLeft accent={outstanding > 0} />
        </div>
      </Card>

      {/* Sibling banner */}
      {siblings.length > 0 && !isBatch && (
        <button onClick={onOpenSiblings} style={{
          width: '100%', textAlign: 'left',
          background: theme.accentSoft, color: theme.accentInk,
          border: `1px solid ${theme.accent}25`,
          borderRadius: 14, padding: '14px 16px', marginBottom: 18,
          cursor: 'pointer', fontFamily: TYPE.body,
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 10, background: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
          }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="5" cy="6" r="2.2" stroke={theme.accent} strokeWidth="1.5"/>
              <circle cx="11" cy="6" r="2.2" stroke={theme.accent} strokeWidth="1.5"/>
              <path d="M2 13c0-1.7 1.3-3 3-3s3 1.3 3 3M8 13c0-1.7 1.3-3 3-3s3 1.3 3 3" stroke={theme.accent} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 500 }}>{siblings.length} {siblings.length === 1 ? 'sibling' : 'siblings'} enrolled</div>
            <div style={{ fontSize: 12.5, opacity: 0.75, marginTop: 1 }}>Record payment for multiple students &rarr;</div>
          </div>
        </button>
      )}

      {isBatch && (
        <div style={{
          background: theme.accentSoft, color: theme.accentInk,
          border: `1px solid ${theme.accent}25`,
          borderRadius: 14, padding: '12px 16px', marginBottom: 18,
          fontSize: 13.5, fontFamily: TYPE.body,
        }}>
          <strong style={{ fontWeight: 600 }}>Batch mode:</strong> recording for {batchSiblings.length} students. Receipt, date and method are shared.
        </div>
      )}

      {/* Form fields */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
        {!isBatch && (
          <>
            <FormField theme={theme} label="Reference number" required error={errors.ref}>
              <FormInput theme={theme} value={form.ref} onChange={v => setForm({ ...form, ref: v })}
                placeholder="e.g. GC-9120384" error={errors.ref} />
            </FormField>

            <FormField theme={theme} label="Amount paid" required error={errors.amount} warn={warnings.amount}>
              <div style={{ position: 'relative' }}>
                <span style={{
                  position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)',
                  color: theme.textFaint, fontSize: 16,
                }}>₱</span>
                <FormInput theme={theme} value={form.amount} onChange={v => setForm({ ...form, amount: v })}
                  placeholder={String(student.expected)} type="text" error={errors.amount} warn={warnings.amount}
                  style={{ paddingLeft: 32 }} />
              </div>
            </FormField>
          </>
        )}

        {isBatch && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 500, color: theme.textMuted, letterSpacing: 0.1 }}>PER STUDENT</div>
            {batchSiblings.map(b => (
              <Card key={b.id} dark={dark} padding={16} style={{ background: theme.surface }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 500 }}>{b.first} {b.last}</div>
                    <div style={{ fontSize: 12.5, color: theme.textMuted }}>Level {b.level} &middot; expected {peso(b.expected)}</div>
                  </div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  <FormInput theme={theme} value={form.batch?.[b.id]?.ref || ''}
                    onChange={v => setForm({ ...form, batch: { ...form.batch, [b.id]: { ...form.batch?.[b.id], ref: v } } })}
                    placeholder="Reference" />
                  <FormInput theme={theme} value={form.batch?.[b.id]?.amount || ''}
                    onChange={v => setForm({ ...form, batch: { ...form.batch, [b.id]: { ...form.batch?.[b.id], amount: v } } })}
                    placeholder={'₱' + b.expected} />
                </div>
              </Card>
            ))}
          </div>
        )}

        <FormField theme={theme} label="Payment method" required>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              { id: 'gcash', label: 'GCash' },
              { id: 'bank_transfer', label: 'Bank Transfer' },
              { id: 'cash', label: 'Cash' },
              { id: 'other', label: 'Other' },
            ].map(m => {
              const active = form.method === m.id;
              return (
                <button key={m.id} onClick={() => setForm({ ...form, method: m.id })} style={{
                  padding: '13px 14px', borderRadius: 12,
                  border: `1px solid ${active ? theme.accent : theme.border}`,
                  background: active ? theme.accentSoft : theme.surface,
                  color: active ? theme.accentInk : theme.text,
                  fontWeight: active ? 500 : 400, fontSize: 14.5,
                  fontFamily: TYPE.body, cursor: 'pointer',
                  textAlign: 'left',
                }}>{m.label}</button>
              );
            })}
          </div>
        </FormField>

        <FormField theme={theme} label="Payment date" required error={errors.date}>
          <FormInput theme={theme} value={form.date} onChange={v => setForm({ ...form, date: v, dateFuture: false })}
            type="date" error={errors.date} />
        </FormField>

        <FormField theme={theme} label="Receipt screenshot" required error={errors.file}>
          {form.receipt ? (
            <div style={{
              display: 'flex', alignItems: 'center', gap: 12,
              padding: 12, background: theme.surface,
              border: `1px solid ${theme.border}`, borderRadius: 12,
            }}>
              <div style={{
                width: 56, height: 56, borderRadius: 8, flexShrink: 0,
                background: `repeating-linear-gradient(45deg, ${theme.sunken} 0, ${theme.sunken} 6px, ${theme.surface} 6px, ${theme.surface} 12px)`,
                border: `1px solid ${theme.border}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 9, color: theme.textFaint, fontFamily: TYPE.mono,
              }}>RECEIPT</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500 }}>gcash-receipt-may.png</div>
                <div style={{ fontSize: 12, color: theme.textMuted }}>1.4 MB &middot; uploaded</div>
              </div>
              <button onClick={() => setForm({ ...form, receipt: false, fileTooBig: false })} style={{
                background: 'transparent', border: 'none', color: theme.textMuted,
                cursor: 'pointer', fontSize: 13, padding: 6,
              }}>Remove</button>
            </div>
          ) : (
            <button onClick={() => setForm({ ...form, receipt: true })} style={{
              width: '100%', padding: '20px 16px',
              border: `1px dashed ${errors.file ? theme.err : theme.borderStrong}`,
              borderRadius: 12, background: 'transparent',
              cursor: 'pointer', fontFamily: TYPE.body,
              color: theme.textMuted, fontSize: 14,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
            }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect x="2" y="3" width="14" height="12" rx="2" stroke={theme.textMuted} strokeWidth="1.5"/>
                <circle cx="6.5" cy="7" r="1.2" fill={theme.textMuted}/>
                <path d="M3 13l4-4 3 3 2-2 3 3" stroke={theme.textMuted} strokeWidth="1.5" strokeLinejoin="round" fill="none"/>
              </svg>
              Take photo or upload
            </button>
          )}
        </FormField>

        <FormField theme={theme} label="Notes (optional)">
          <textarea
            value={form.notes || ''} onChange={e => setForm({ ...form, notes: e.target.value })}
            placeholder="e.g. Parent says will pay remaining next week"
            rows={3}
            style={{
              width: '100%', boxSizing: 'border-box',
              padding: '12px 14px', fontSize: 15,
              fontFamily: TYPE.body, color: theme.text,
              background: theme.surface,
              border: `1px solid ${theme.border}`,
              borderRadius: 12, outline: 'none', resize: 'none',
            }}
          />
        </FormField>
      </div>

      <div style={{
        position: 'sticky', bottom: 0, marginTop: 24,
        background: `linear-gradient(to top, ${theme.bg} 60%, transparent)`,
        paddingTop: 12, paddingBottom: 4,
      }}>
        <Btn variant="primary" full onClick={canSubmit ? onContinue : undefined}
          disabled={!canSubmit}
          style={{ background: theme.accent, padding: '15px 18px', fontSize: 15.5 }}>
          Review summary
        </Btn>
      </div>
    </MobileShell>
  );
}

function SummaryCell({ theme, label, value, borderTop, borderLeft, accent }) {
  return (
    <div style={{
      padding: '12px 18px',
      borderTop: borderTop ? `1px solid ${theme.border}` : 'none',
      borderLeft: borderLeft ? `1px solid ${theme.border}` : 'none',
    }}>
      <div style={{ fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 500 }}>{label}</div>
      <div style={{
        fontSize: 17, fontFamily: TYPE.display, fontWeight: 400, marginTop: 4,
        color: accent ? theme.unpaid.fg : theme.text, letterSpacing: -0.2,
      }}>{value}</div>
    </div>
  );
}

function FormField({ theme, label, required, error, warn, children }) {
  return (
    <div>
      <div style={{
        fontSize: 12.5, fontWeight: 500, color: theme.textMuted,
        marginBottom: 8, letterSpacing: 0.2, textTransform: 'uppercase',
      }}>{label}{required && <span style={{ color: theme.err, marginLeft: 4 }}>*</span>}</div>
      {children}
      {error && <div style={{ marginTop: 6, fontSize: 12.5, color: theme.err, lineHeight: 1.4 }}>{error}</div>}
      {warn && !error && <div style={{ marginTop: 6, fontSize: 12.5, color: theme.warn, lineHeight: 1.4 }}>{warn}</div>}
    </div>
  );
}

function FormInput({ theme, value, onChange, placeholder, type = 'text', error, warn, style }) {
  const borderColor = error ? theme.err : warn ? theme.warn : theme.border;
  return (
    <input
      type={type} value={value ?? ''} onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{
        width: '100%', boxSizing: 'border-box',
        padding: '13px 16px', fontSize: 15.5,
        fontFamily: TYPE.body, color: theme.text,
        background: theme.surface,
        border: `1px solid ${borderColor}`,
        borderRadius: 12, outline: 'none',
        ...style,
      }}
      onFocus={e => e.currentTarget.style.borderColor = error ? theme.err : warn ? theme.warn : theme.accent}
      onBlur={e => e.currentTarget.style.borderColor = borderColor}
    />
  );
}

// ─── Step 5 (alt route): Sibling selection ─────────────────────────

function SiblingSelectScreen({ theme, dark, student, selected, onToggle, onConfirm, onBack }) {
  const siblings = STUDENTS.filter(s => s.familyId === student.familyId);
  return (
    <MobileShell theme={theme} dark>
      <TeacherTopBar theme={theme} title="Select siblings" onBack={onBack} />
      <ScreenHeader theme={theme}
        kicker={`${student.guardian} family`}
        title="Who's included?"
        subtitle="Pick the children covered by this payment. They share the same receipt and date."
      />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {siblings.map(s => {
          const checked = selected.includes(s.id);
          const isOriginal = s.id === student.id;

// ─── Step 8: Summary review ────────────────────────────────────────

function SummaryScreen({ theme, dark, student, form, batchSiblings, onSubmit, onBack }) {
  const isBatch = batchSiblings && batchSiblings.length > 0;
  const totalAmt = isBatch
    ? batchSiblings.reduce((sum, s) => sum + (parseFloat(form.batch?.[s.id]?.amount) || 0), 0)
    : parseFloat(form.amount) || 0;

  const expected = isBatch
    ? batchSiblings.reduce((sum, s) => sum + s.expected, 0)
    : student.expected;
  const showWarn = Math.abs(totalAmt - expected) / expected > 0.10;

  const methodLabel = { gcash: 'GCash', bank_transfer: 'Bank Transfer', cash: 'Cash', other: 'Other' }[form.method];

  return (
    <MobileShell theme={theme} dark>
      <TeacherTopBar theme={theme} title="Review and submit" onBack={onBack} />

      <ScreenHeader theme={theme}
        kicker="Step 8 of 10"
        title="Looks right?"
        subtitle="Once submitted, this goes to admin for verification. You'll see status updates in your queue."
      />

      {showWarn && (
        <div style={{
          background: theme.warnSoft, border: `1px solid ${theme.warn}40`,
          borderRadius: 12, padding: '12px 14px', marginBottom: 18,
          fontSize: 13, lineHeight: 1.45, color: theme.text,
          display: 'flex', gap: 10,
        }}>
          <div style={{
            width: 18, height: 18, borderRadius: '50%', background: theme.warn, color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 12, fontWeight: 700, flexShrink: 0,
          }}>!</div>
          <div>
            <strong style={{ fontWeight: 600 }}>Amount differs from expected.</strong> {peso(totalAmt)} vs. {peso(expected)} expected. Please verify with the receipt before submitting.
          </div>
        </div>
      )}

      <Card dark={dark} padding={0} style={{ marginBottom: 16, overflow: 'hidden' }}>
        <SummaryRow theme={theme} label={isBatch ? 'Family' : 'Student'} value={isBatch ? `${student.guardian.split(' ').slice(-1)[0]} family (${batchSiblings.length})` : `${student.first} ${student.last}`} />
        <SummaryRow theme={theme} label="Period" value="May 2026" />
        <SummaryRow theme={theme} label={isBatch ? 'Total amount' : 'Amount paid'} value={peso(totalAmt)} accent />
        <SummaryRow theme={theme} label="Expected" value={peso(expected)} muted />
        <SummaryRow theme={theme} label="Method" value={methodLabel} />
        <SummaryRow theme={theme} label="Date" value={form.date || '—'} />
        {!isBatch && <SummaryRow theme={theme} label="Reference" value={form.ref} mono />}
      </Card>

      {isBatch && (
        <Card dark={dark} padding={0} style={{ marginBottom: 16, overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600 }}>
            Per-student breakdown
          </div>
          {batchSiblings.map(s => (
            <SummaryRow key={s.id} theme={theme}
              label={`${s.first} ${s.last}`}
              value={peso(parseFloat(form.batch?.[s.id]?.amount) || 0)}
              sub={'Ref: ' + (form.batch?.[s.id]?.ref || '—')}
            />
          ))}
        </Card>
      )}

      <Card dark={dark} padding={16} style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600, marginBottom: 10 }}>
          Receipt
        </div>
        <div style={{
          height: 140, borderRadius: 10,
          background: `repeating-linear-gradient(45deg, ${theme.sunken} 0, ${theme.sunken} 8px, ${theme.surface} 8px, ${theme.surface} 16px)`,
          border: `1px solid ${theme.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: theme.textFaint, fontSize: 11, fontFamily: TYPE.mono,
        }}>gcash-receipt-may.png &middot; 1.4 MB</div>
      </Card>

      <div style={{ display: 'flex', gap: 10 }}>
        <Btn variant="secondary" onClick={onBack} dark={dark} style={{ flex: 1 }}>Back</Btn>
        <Btn variant="primary" onClick={onSubmit} dark={dark}
          style={{ flex: 2, background: theme.accent }}>Submit for review</Btn>
      </div>
    </MobileShell>
  );
}

function SummaryRow({ theme, label, value, sub, accent, muted, mono }) {
  return (
    <div style={{
      display: 'flex', alignItems: sub ? 'flex-start' : 'center',

function FieldDT({ theme, label, required, children }) {
  return (
    <div>
      <div style={{
        fontSize: 11.5, fontWeight: 500, color: theme.textMuted,
        marginBottom: 6, letterSpacing: 0.4, textTransform: 'uppercase',
      }}>{label}{required && <span style={{ color: theme.err, marginLeft: 4 }}>*</span>}</div>
      {children}
    </div>
  );
}

function InputDT({ theme, value, onChange, type = 'text', prefix }) {
  return (
    <div style={{ position: 'relative' }}>
      {prefix && <span style={{
        position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)',
        color: theme.textFaint, fontSize: 14,
      }}>{prefix}</span>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)}
        style={{
          width: '100%', boxSizing: 'border-box',
          padding: prefix ? '10px 12px 10px 26px' : '10px 12px',
          fontSize: 14, fontFamily: TYPE.body, color: theme.text,
          background: theme.surface, border: `1px solid ${theme.border}`,
          borderRadius: 10, outline: 'none',
        }}/>
    </div>
  );
}

function Fact({ theme, label, value, accent }) {
  return (
    <div>
      <div style={{ fontSize: 11, letterSpacing: 0.6, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 500 }}>{label}</div>
      <div style={{
        fontSize: 18, fontFamily: TYPE.display, fontWeight: 600, marginTop: 4,
        color: accent ? theme.unpaid.fg : theme.text, letterSpacing: -0.2,
      }}>{value}</div>
    </div>
  );
}

// ─── Verification queue ────────────────────────────────────────────

function AdminQueueScreen({ theme, dark, statusStyle, payments, onAct, selectedId, setSelectedId }) {
  const groupedByBatch = useMemoA(() => {
    const groups = [];
    const seen = new Set();
    for (const p of payments) {
      if (seen.has(p.id)) continue;
      if (p.batch) {
        const batch = payments.filter(x => x.batch === p.batch);
        batch.forEach(x => seen.add(x.id));
        groups.push({ type: 'batch', items: batch });
      } else {
        seen.add(p.id);
        groups.push({ type: 'single', items: [p] });
      }
    }
    return groups;
  }, [payments]);

  const selected = payments.find(p => p.id === selectedId) || payments[0];
  const selectedStudent = STUDENTS.find(s => s.id === selected?.studentId);

  return (
    <div style={{ display: 'flex', height: '100%' }}>
      {/* List column */}
      <div style={{
        width: 420, flexShrink: 0,
        borderRight: `1px solid ${theme.border}`,
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ padding: '24px 24px 16px' }}>
          <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600 }}>
            Awaiting review
          </div>
          <h1 style={{
            fontFamily: TYPE.display, fontWeight: 400, fontSize: 28,
            margin: '6px 0 0', letterSpacing: -0.4,
          }}>{payments.length} payments</h1>

          {/* Filters */}
          <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
            {['All', 'Today', 'Flagged', 'Batches'].map((f, i) => (
              <button key={f} style={{
                padding: '6px 11px', borderRadius: 7, fontSize: 12.5,
                background: i === 0 ? theme.text : 'transparent',
                color: i === 0 ? theme.bg : theme.textMuted,
                border: i === 0 ? 'none' : `1px solid ${theme.border}`,
                cursor: 'pointer', fontFamily: TYPE.body,
              }}>{f}</button>
            ))}
          </div>
        </div>

        <div style={{ flex: 1, overflow: 'auto', padding: '0 16px 24px' }}>
          {groupedByBatch.map((g, gi) => (
            <div key={gi} style={{ marginBottom: 8 }}>
              {g.type === 'batch' && (
                <div style={{
                  fontSize: 11, color: theme.textMuted,
                  padding: '6px 8px 4px', display: 'flex', alignItems: 'center', gap: 6,
                  letterSpacing: 0.4,
                }}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 2h3v3H2zM7 2h3v3H7zM2 7h3v3H2zM7 7h3v3H7z" stroke={theme.textMuted} strokeWidth="1"/>
                  </svg>
                  Family batch &middot; same receipt
                </div>
              )}
              <div style={{
                background: g.type === 'batch' ? theme.sunken : 'transparent',
                borderRadius: 12, padding: g.type === 'batch' ? 4 : 0,
                display: 'flex', flexDirection: 'column', gap: 4,
              }}>
                {g.items.map(p => {
                  const stu = STUDENTS.find(x => x.id === p.studentId);
                  const isSel = p.id === selected?.id;
                  return (
                    <button key={p.id} onClick={() => setSelectedId(p.id)} style={{
                      display: 'flex', alignItems: 'center', gap: 12,
                      padding: '12px 14px', borderRadius: 10,
                      background: isSel ? theme.accentSoft : theme.surface,
                      border: `1px solid ${isSel ? theme.accent + '60' : theme.border}`,
                      cursor: 'pointer', textAlign: 'left',
                      fontFamily: TYPE.body,
                    }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                        background: theme.surface, border: `1px solid ${theme.border}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 11, color: theme.textFaint, fontFamily: TYPE.mono,
                      }}>RCP</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
                          <div style={{ fontSize: 14, fontWeight: 500, letterSpacing: -0.1 }}>
                            {stu?.first} {stu?.last}
                          </div>
                          <div style={{ fontSize: 14, fontFamily: TYPE.display, color: p.amount === p.expected ? theme.text : theme.warn }}>
                            {peso(p.amount)}
                          </div>
                        </div>
                        <div style={{
                          fontSize: 12, color: theme.textMuted, marginTop: 2,
                          display: 'flex', justifyContent: 'space-between', gap: 10,
                        }}>
                          <span>{p.method} &middot; {p.recordedBy}</span>
                          <span>{p.recordedAt}</span>
                        </div>
                      </div>
                      {p.flag && (
                        <div title="Flagged" style={{
                          width: 6, height: 6, borderRadius: '50%', background: theme.warn, flexShrink: 0,
                        }} />
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Detail column */}
      {selected && selectedStudent && (
        <div style={{ flex: 1, overflow: 'auto', padding: '24px 32px 36px', minWidth: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 24, marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600 }}>
                {selected.number} &middot; pending review
              </div>
              <h2 style={{
                fontFamily: TYPE.display, fontWeight: 400, fontSize: 32,
                margin: '6px 0 4px', letterSpacing: -0.5,
              }}>{selectedStudent.first} {selectedStudent.last}</h2>
              <div style={{ fontSize: 13.5, color: theme.textMuted }}>
                Recorded by {selected.recordedBy} &middot; {selected.recordedAt} &middot; Level {selectedStudent.level}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
              <Btn variant="secondary" dark={dark} onClick={() => onAct(selected.id, 'rejected')}>Reject</Btn>
              <Btn variant="secondary" dark={dark} onClick={() => onAct(selected.id, 'flagged')}
                style={{ borderColor: theme.warn, color: theme.warn }}>Flag</Btn>
              <Btn variant="primary" dark={dark} onClick={() => onAct(selected.id, 'verified')}
                style={{ background: theme.accent }}>Verify</Btn>
            </div>
          </div>

          {selected.flag && (
            <div style={{
              background: theme.warnSoft, border: `1px solid ${theme.warn}40`,
              borderRadius: 10, padding: '10px 14px', marginBottom: 18,
              fontSize: 13, color: theme.text,
              display: 'flex', gap: 10, alignItems: 'center',
            }}>
              <div style={{
                width: 18, height: 18, borderRadius: '50%', background: theme.warn, color: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, fontWeight: 700, flexShrink: 0,
              }}>!</div>
              <span><strong style={{ fontWeight: 600 }}>Amount mismatch</strong> &middot; paid {peso(selected.amount)} of {peso(selected.expected)} expected</span>
            </div>
          )}

          <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 24 }}>
            {/* Receipt + facts */}
            <div>
              <div style={{ fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: theme.textMuted, fontWeight: 600, marginBottom: 8 }}>
                Receipt screenshot
              </div>
              <div style={{
                aspectRatio: '4 / 5',
                background: `repeating-linear-gradient(45deg, ${theme.sunken} 0, ${theme.sunken} 10px, ${theme.surface} 10px, ${theme.surface} 20px)`,
                border: `1px solid ${theme.border}`, borderRadius: 14,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: theme.textFaint, fontSize: 12, fontFamily: TYPE.mono,
              }}>{selected.method.toLowerCase()}-receipt-{selected.number}.png</div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <DetailRow theme={theme} label="Amount paid" value={peso(selected.amount)} accent />
              <DetailRow theme={theme} label="Expected" value={peso(selected.expected)} muted />
              <div style={{ height: 1, background: theme.border, margin: '4px 0' }} />
              <DetailRow theme={theme} label="Reference number" value={selected.ref} mono />
              <DetailRow theme={theme} label="Method" value={selected.method} />
              <DetailRow theme={theme} label="Payment date" value={selected.date} />
              <DetailRow theme={theme} label="Period" value="May 2026" />
              <DetailRow theme={theme} label="Family" value={selectedStudent.guardian} />
              {selected.notes && (
                <div style={{
                  marginTop: 6, padding: '10px 12px',
                  background: theme.sunken, borderRadius: 10,
                  fontSize: 13, color: theme.textMuted, lineHeight: 1.5,
                }}>
                  <span style={{ fontWeight: 500, color: theme.text }}>Note: </span>{selected.notes}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DetailRow({ theme, label, value, accent, muted, mono }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 16 }}>
      <div style={{ fontSize: 12.5, color: theme.textMuted, fontWeight: 500 }}>{label}</div>
      <div style={{
        fontSize: accent ? 22 : 14,
        fontFamily: accent ? TYPE.display : (mono ? TYPE.mono : TYPE.body),
        fontWeight: accent ? 400 : 500,
        color: muted ? theme.textMuted : theme.text,
        letterSpacing: accent ? -0.3 : 0,
      }}>{value}</div>
    </div>
  );
}

                <th style={thStyle(theme, 'left')}>Student</th>
                <th style={thStyle(theme, 'left')}>Guardian</th>

                    <td style={tdStyle(theme)}>

                    <td style={{ ...tdStyle(theme), color: theme.textMuted, fontFamily: TYPE.mono, fontSize: 12 }}>{s.level}</td>
                    {cells.map((c, ci) => (
                      <td key={ci} style={{ ...tdStyle(theme), textAlign: 'center', padding: '10px 8px' }}>

          <StatusBadge key={s} status={s} style="dot" dark={dark} />

    </div>
  );
}

function thStyle(theme, align) {
  return {
    padding: '12px 14px', textAlign: align, fontWeight: 500,
    color: theme.textMuted, fontSize: 11, letterSpacing: 1, textTransform: 'uppercase',
    whiteSpace: 'nowrap',
  };
}
function tdStyle(theme) {
  return { padding: '12px 14px', color: theme.text, verticalAlign: 'middle' };
}

function CellMark({ status, theme, expected }) {
  const s = theme[status] || theme.pending;
  const labels = { paid: '✓', partial: '½', unpaid: '—', pending: '·' };
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: 30, height: 30, borderRadius: 8,
      background: s.bg, color: s.fg, fontSize: 13, fontWeight: 600,
    }}>{labels[status]}</div>
  );
}

function BarChart({ data, theme }) {
  const max = 100;
  const chartH = 180;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 18, height: chartH + 40 }}>
      {data.map(d => {
        const h = (d.collected / max) * chartH;
        const isLast = d === data[data.length - 1];
        return (
          <div key={d.m} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
            <div style={{
              fontSize: 12, color: isLast ? theme.text : theme.textMuted,
              fontFamily: TYPE.display, fontWeight: 400,
            }}>{d.collected}%</div>
            <div style={{
              width: '100%', height: chartH,
              display: 'flex', alignItems: 'flex-end',
            }}>
              <div style={{
                width: '100%', height: h,
                background: isLast ? theme.accent : theme.accentSoft,
                borderRadius: '6px 6px 0 0',
              }} />
            </div>
            <div style={{ fontSize: 12, color: theme.textMuted, letterSpacing: 0.3 }}>{d.m}</div>
          </div>
        );
      })}
    </div>
  );
}

function ProgressStack({ theme }) {
  const segments = [
    { label: 'Verified',       count: 56, value: 196000, color: theme.paid.dot },
    { label: 'Pending review', count: 6,  value: 21000,  color: theme.partial.dot },
    { label: 'Partial',        count: 4,  value: 7000,   color: theme.partial.bg, ring: true },
    { label: 'Unpaid',         count: 12, value: 0,      color: theme.unpaid.bg, ring: true },
  ];
  const total = 78;
  return (
    <div>
      <div style={{
        height: 14, borderRadius: 7, overflow: 'hidden',
        display: 'flex', background: theme.sunken,
      }}>
        {segments.map((s, i) => (
          <div key={i} style={{
            flex: s.count, background: s.color,
          }} title={`${s.label}: ${s.count}`} />
        ))}
      </div>
      <div style={{ display: 'flex', gap: 24, marginTop: 16, flexWrap: 'wrap' }}>
        {segments.map(s => (
          <div key={s.label} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
