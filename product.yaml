notes: >
  Tuition payment operations platform for Kumon franchise owner Mrs. Nina Quijano.
  Replaces manual flow: parents send payment screenshots to teachers via GC →
  teachers forward emails to central inbox → admin manually transcribes to spreadsheet.
  System eliminates email forwarding and manual transcription entirely.
  Fork of sneaker-doc-pos — reuse monorepo structure, RBAC, transaction flow,
  audit logging, branch scoping, receipt handling, scaled integer money pattern.
  Key net-new: student-teacher assignments, payment periods, family/student split,
  admin verification workflow, payment status dashboards.
