# Kumon Iligan Ops: Cloud Build: parallel build + deploy
# Manual submit:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD) \
#     /path/to/source.tar.gz
#
# Substitutions:
#   SHORT_SHA      7-char commit SHA
#   _REGION        Cloud Run region (default: asia-southeast1)
#   _BACKEND_URL   Cloud Run URL of the backend service (server-side proxy target)
#   _APP_URL       Public URL of the frontend service (for NEXTAUTH_URL etc.)

substitutions:
  _REGION: asia-southeast1
  _BACKEND_SERVICE: kumon-iligan-backend
  _FRONTEND_SERVICE: kumon-iligan-frontend
  _REGISTRY: asia-southeast1-docker.pkg.dev
  _BACKEND_URL: 'https://kumon-iligan-backend-eu7lzuq4wq-as.a.run.app'
  _APP_URL: 'https://kumon-iligan-frontend-PLACEHOLDER.a.run.app'

steps:
  # ── 1a: Build backend image (starts immediately)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    waitFor: ['-']
    args:
      - build
      - -f
      - Dockerfile.backend
      - -t
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/backend:$SHORT_SHA
      - -t
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/backend:latest
      - .

  # ── 1b: Build frontend image (starts immediately, parallel with backend)
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    waitFor: ['-']
    args:
      - build
      - -f
      - Dockerfile.frontend
      - --build-arg
      - NEXT_PUBLIC_API_URL=/api/backend
      - --build-arg
      - NEXT_PUBLIC_APP_URL=$_APP_URL
      - -t
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/frontend:$SHORT_SHA
      - -t
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/frontend:latest
      - .

  # ── 2a: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/backend

  # ── 2b: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - $_REGISTRY/$PROJECT_ID/kumon-iligan/frontend

  # ── 3a: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_REGISTRY/$PROJECT_ID/kumon-iligan/backend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest
      - --set-env-vars=NODE_ENV=production,SUPABASE_STORAGE_BUCKET=receipts,CORS_ORIGIN=$_APP_URL

  # ── 3b: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=$_REGISTRY/$PROJECT_ID/kumon-iligan/frontend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=AUTH_SECRET=NEXTAUTH_SECRET:latest,AUTH_GOOGLE_ID=GOOGLE_CLIENT_ID:latest,AUTH_GOOGLE_SECRET=GOOGLE_CLIENT_SECRET:latest
      - --set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=/api/backend,NEXT_PUBLIC_APP_URL=$_APP_URL,AUTH_TRUST_HOST=true,NEXTAUTH_URL=$_APP_URL,BACKEND_URL=$_BACKEND_URL

images:
  - $_REGISTRY/$PROJECT_ID/kumon-iligan/backend:$SHORT_SHA
  - $_REGISTRY/$PROJECT_ID/kumon-iligan/frontend:$SHORT_SHA

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
