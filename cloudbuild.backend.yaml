steps:
  # 1. Install backend dependencies and build
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd backend
        npm install
        npm run build
    dir: '/workspace'

  # 2. Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.backend'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend:$SHORT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend:latest'
      - '.'

  # 3. Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend'

  # 4. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'kumon-iligan-backend'
      - '--image=asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend:$SHORT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest'
      - '--set-env-vars=NODE_ENV=production,SUPABASE_STORAGE_BUCKET=receipts,CORS_ORIGIN=${_CORS_ORIGIN}'

images:
  - 'asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend:$SHORT_SHA'
  - 'asia-southeast1-docker.pkg.dev/kumon-iligan-ops/kumon-iligan/backend:latest'

substitutions:
  _CORS_ORIGIN: 'https://kumon-iligan-frontend-PLACEHOLDER.a.run.app'

options:
  logging: CLOUD_LOGGING_ONLY
